<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>UNION biometrics Email Signature Builder</title>
<meta property="og:title" content="UNION biometrics Email Signature Builder" />
<meta property="og:description" content="이름과 연락처만 입력하면 회사 공통 양식이 적용된 이메일 서명이 완성됩니다." />
<style>
  :root{
    --teal:#51afa2; --teal-deep:#2f9aa3; --green:#008143;
    --ink:#15201e; --ink-soft:#5a6b68;
    --bg:#eef4f3; --card:#ffffff; --line:#d7e4e2; --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",arial,sans-serif;
    background:var(--bg); color:var(--ink); min-height:100vh;
  }
  header.app{
    background:linear-gradient(120deg, var(--teal-deep), var(--teal) 55%, var(--green));
    color:#fff; padding:26px 32px 22px;
  }
  header.app h1{margin:0;font-size:21px;letter-spacing:-0.3px;}
  header.app p{margin:6px 0 0;font-size:13px;opacity:.92;}
  .wrap{
    display:grid; grid-template-columns:minmax(320px, 400px) 1fr;
    gap:24px; padding:24px 32px 48px; max-width:1400px; margin:0 auto;
  }
  @media (max-width: 980px){ .wrap{grid-template-columns:1fr;padding:18px 14px 40px;} }
  .panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:22px;}
  .panel h2{margin:0 0 14px;font-size:14px;letter-spacing:.4px;color:var(--teal-deep);text-transform:uppercase;}
  .field{margin-bottom:12px;}
  .field label{display:block;font-size:12px;font-weight:600;margin-bottom:4px;}
  .field label small{font-weight:400;color:var(--ink-soft);}
  .field input{
    width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:8px;
    font-size:13px;font-family:inherit;color:var(--ink);background:#fbfdfd;
    transition:border-color .15s, box-shadow .15s;
  }
  .field input:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px rgba(81,175,162,.18);}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .radio-row{display:flex;gap:14px;padding:4px 0;}
  .radio{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500;cursor:pointer;}
  .radio input{width:auto;accent-color:var(--teal);cursor:pointer;}
  .company-note{
    margin-top:16px;padding:12px 14px;border-radius:10px;
    background:rgba(81,175,162,.08);border:1px solid rgba(81,175,162,.3);
    font-size:12px;color:var(--ink-soft);line-height:1.6;
  }
  .company-note b{color:var(--teal-deep);}
  .preview-stage{
    background:repeating-conic-gradient(#f3f7f6 0% 25%, #ffffff 0% 50%) 0 0/24px 24px;
    border:1px solid var(--line);border-radius:10px;padding:20px;overflow:auto;
  }
  .actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px;}
  button{
    font-family:inherit;font-size:13px;font-weight:700;border:none;border-radius:9px;
    padding:11px 16px;cursor:pointer;transition:transform .08s, opacity .15s;
  }
  button:active{transform:translateY(1px);}
  button:hover{opacity:.9;}
  .btn-primary{background:var(--green);color:#fff;}
  .btn-teal{background:var(--teal);color:#fff;}
  .btn-ghost{background:#fff;color:var(--teal-deep);border:1px solid var(--teal);}
  .hint{font-size:12px;color:var(--ink-soft);margin-top:12px;line-height:1.6;}
  .toast{
    position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(8px);
    background:var(--ink);color:#fff;padding:10px 18px;border-radius:999px;
    font-size:13px;opacity:0;pointer-events:none;transition:opacity .2s, transform .2s;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  details.code{margin-top:16px;}
  details.code summary{cursor:pointer;font-size:13px;font-weight:700;color:var(--teal-deep);}
  textarea#htmlOut{
    width:100%;height:200px;margin-top:10px;
    font-family:Consolas,Menlo,monospace;font-size:11.5px;
    border:1px solid var(--line);border-radius:8px;padding:10px;
    color:var(--ink);background:#fbfdfd;resize:vertical;
  }
  @media (prefers-reduced-motion: reduce){ *{transition:none !important;} }
</style>
</head>
<body>

<header class="app">
  <h1>이메일 서명 만들기</h1>
  <p>이름과 연락처만 입력하면 회사 공통 양식이 적용된 서명이 완성됩니다.</p>
</header>

<div class="wrap">

  <section class="panel" aria-label="내 정보 입력">
    <h2>내 정보</h2>
    <form id="sigForm">
      <div class="grid2">
        <div class="field">
          <label for="f_name">이름 (국문)</label>
          <input id="f_name" data-key="name" placeholder="송지호" autocomplete="name" />
        </div>
        <div class="field">
          <label for="f_nameEn">영문 이름 <small>선택</small></label>
          <input id="f_nameEn" data-key="nameEn" placeholder="Jiho Song" />
        </div>
      </div>
      <div class="grid2">
        <div class="field">
          <label for="f_dept">본부 / 팀</label>
          <input id="f_dept" data-key="dept" placeholder="전략기획본부 / 마케팅팀" />
        </div>
        <div class="field">
          <label for="f_title">직책 / 직급</label>
          <input id="f_title" data-key="title" placeholder="팀장" />
        </div>
      </div>
      <div class="grid2">
        <div class="field">
          <label for="f_tel">직통 (T)</label>
          <input id="f_tel" data-key="tel" placeholder="82 2-6488-0000" />
        </div>
        <div class="field">
          <label for="f_mobile">휴대폰 (M) <small>선택</small></label>
          <input id="f_mobile" data-key="mobile" placeholder="82 10-0000-0000" />
        </div>
      </div>
      <div class="field">
        <label for="f_email">이메일 (E)</label>
        <input id="f_email" data-key="email" placeholder="id@unionbiometrics.com" autocomplete="email" />
      </div>
      <div class="field">
        <label>주소 (A)</label>
        <div class="radio-row">
          <label class="radio"><input type="radio" name="addrSel" value="ko" checked /> 국문</label>
          <label class="radio"><input type="radio" name="addrSel" value="en" /> 영문</label>
          <label class="radio"><input type="radio" name="addrSel" value="both" /> 병기</label>
        </div>
      </div>
      <div class="field">
        <label>하단 배너</label>
        <div class="radio-row">
          <label class="radio"><input type="radio" name="bannerSel" value="ko" checked /> 국문</label>
          <label class="radio"><input type="radio" name="bannerSel" value="en" /> 영문</label>
          <label class="radio"><input type="radio" name="bannerSel" value="none" /> 사용 안 함</label>
        </div>
      </div>
    </form>

    <div class="company-note" id="companyNote">
      <b>회사 공통 항목</b> — 로고, 배너, 주소, 웹사이트, SNS, 연락처 아이콘은
      관리자 설정(config.json)에서 자동으로 적용됩니다. 변경이 필요하면 관리자에게 문의하세요.
    </div>
  </section>

  <section class="panel" aria-label="서명 미리보기">
    <h2>미리보기</h2>
    <div class="preview-stage">
      <div id="preview"></div>
    </div>

    <div class="actions">
      <button type="button" class="btn-primary" id="btnCopyRich">서명 복사 (메일에 붙여넣기)</button>
      <button type="button" class="btn-teal" id="btnCopyHtml">HTML 소스 복사</button>
      <button type="button" class="btn-ghost" id="btnDownload">.html 파일 다운로드</button>
    </div>

    <p class="hint">
      <b>서명 복사</b>를 누른 뒤 Outlook·Gmail의 서명 설정 화면에 붙여넣기(Ctrl+V) 하면
      서식이 그대로 유지됩니다.
    </p>

    <details class="code">
      <summary>생성된 HTML 소스 보기</summary>
      <textarea id="htmlOut" readonly spellcheck="false"></textarea>
    </details>
  </section>
</div>

<div class="toast" id="toast" role="status"></div>

<script src="sig-core.js"></script>
<script>
(function(){
  "use strict";
  var config = SigCore.DEFAULT_CONFIG;
  var preview = document.getElementById("preview");
  var htmlOut = document.getElementById("htmlOut");

  function readPersonal(){
    var v = {};
    document.querySelectorAll("#sigForm [data-key]").forEach(function(el){
      v[el.dataset.key] = el.value.trim();
    });
    var b = document.querySelector('input[name="bannerSel"]:checked');
    v.banner = b ? b.value : "ko";
    var a = document.querySelector('input[name="addrSel"]:checked');
    v.addrLang = a ? a.value : "ko";
    return v;
  }
  function render(){
    var html = SigCore.buildSignature(readPersonal(), config);
    preview.innerHTML = html;
    htmlOut.value = html;
  }

  document.getElementById("sigForm").addEventListener("input", render);
  document.getElementById("sigForm").addEventListener("change", render);

  SigCore.loadConfig().then(function(c){
    config = c;
    render();
  });
  render();

  var toast = document.getElementById("toast"), toastTimer;
  function showToast(msg){
    toast.textContent = msg;
    toast.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ toast.classList.remove("show"); }, 2200);
  }

  document.getElementById("btnCopyRich").addEventListener("click", function(){
    var html = htmlOut.value;
    function fallbackCopy(){
      var range = document.createRange();
      range.selectNodeContents(preview);
      var sel = window.getSelection();
      sel.removeAllRanges(); sel.addRange(range);
      try { document.execCommand("copy"); showToast("서명이 복사되었습니다."); }
      catch(e){ showToast("복사 실패 — 미리보기를 드래그해 직접 복사해 주세요."); }
      sel.removeAllRanges();
    }
    if (navigator.clipboard && window.ClipboardItem) {
      var item = new ClipboardItem({
        "text/html":  new Blob([html], {type:"text/html"}),
        "text/plain": new Blob([preview.innerText], {type:"text/plain"})
      });
      navigator.clipboard.write([item]).then(function(){
        showToast("서명이 복사되었습니다. 메일 서명 설정에 붙여넣으세요.");
      }, fallbackCopy);
    } else { fallbackCopy(); }
  });

  document.getElementById("btnCopyHtml").addEventListener("click", function(){
    navigator.clipboard.writeText(htmlOut.value).then(function(){
      showToast("HTML 소스가 복사되었습니다.");
    }, function(){
      htmlOut.select(); document.execCommand("copy");
      showToast("HTML 소스가 복사되었습니다.");
    });
  });

  document.getElementById("btnDownload").addEventListener("click", function(){
    var v = readPersonal();
    var doc = '<!DOCTYPE html>\n<html lang="ko">\n<head>\n<meta charset="utf-8" />\n<title>Email Signature</title>\n</head>\n<body>\n'
      + htmlOut.value + '</body>\n</html>\n';
    var blob = new Blob([doc], {type:"text/html;charset=utf-8"});
    var a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "signature_" + (v.name || "user") + ".html";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
    showToast("서명 파일이 다운로드되었습니다.");
  });
})();
</script>
</body>
</html>
